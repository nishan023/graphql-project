version: "3.8"

services:
  postgres:
    container_name: threads-db
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: threads
      POSTGRES_DB: threads
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  adminer:
    container_name: threads-adminer
    image: adminer:4
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    restart: unless-stopped
volumes:
  postgres_data:
